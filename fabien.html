<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fabien — Conseiller technique FAIRĒKO</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;1,400&family=DM+Sans:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

<style>
  :root {
    --green-deep:    #1a2e1a;
    --green-mid:     #2d5a2d;
    --green-soft:    #4a7a4a;
    --cream:         #f5f1e8;
    --cream-light:   #faf7f0;
    --sand:          #c8b896;
    --sand-deep:     #8a7a5c;
    --paper:         #fdfbf6;
    --ink:           #1a1a1a;
    --ink-soft:      #4a4a4a;
    --line:          #e5dfd0;
    --line-soft:     #f0ebd9;
    --rust:          #b85c2c;
    --moss:          #6b7d4a;
  }

  html, body {
    background: var(--paper);
    color: var(--ink);
    font-family: 'DM Sans', -apple-system, sans-serif;
    -webkit-font-smoothing: antialiased;
  }

  .font-display { font-family: 'Playfair Display', serif; }
  .font-mono    { font-family: 'DM Mono', monospace; }

  /* Subtle paper grain */
  body::before {
    content: '';
    position: fixed; inset: 0;
    pointer-events: none;
    z-index: 0;
    background-image:
      radial-gradient(circle at 20% 30%, rgba(200,184,150,0.08) 0%, transparent 40%),
      radial-gradient(circle at 80% 70%, rgba(74,122,74,0.04) 0%, transparent 50%);
  }

  /* Grain overlay */
  .grain::after {
    content: '';
    position: absolute; inset: 0;
    pointer-events: none;
    opacity: 0.04;
    mix-blend-mode: multiply;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='3' /%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
  }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 8px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--sand); border-radius: 4px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--sand-deep); }

  /* Animations */
  @keyframes fadeInUp {
    from { opacity: 0; transform: translateY(8px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  @keyframes pulseGreen {
    0%, 100% { box-shadow: 0 0 0 0 rgba(45,90,45,0.4); }
    50%      { box-shadow: 0 0 0 10px rgba(45,90,45,0); }
  }
  @keyframes typewriterDot {
    0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
    30%           { transform: translateY(-3px); opacity: 1; }
  }
  @keyframes shimmer {
    0%   { background-position: -200% 0; }
    100% { background-position: 200% 0; }
  }

  .anim-fade-up    { animation: fadeInUp 0.4s cubic-bezier(0.16, 1, 0.3, 1) both; }
  .anim-pulse      { animation: pulseGreen 2s ease-in-out infinite; }

  /* Markdown-ish styling for messages */
  .msg-content strong { font-weight: 600; color: var(--green-deep); }
  .msg-content em     { font-style: italic; color: var(--ink-soft); }

  /* Button hover lift */
  .btn-hover {
    transition: transform 0.15s ease, box-shadow 0.2s ease, background-color 0.2s ease;
  }
  .btn-hover:hover {
    transform: translateY(-1px);
  }
  .btn-hover:active {
    transform: translateY(0);
  }

  /* Quick option chip */
  .chip-option {
    background: var(--cream-light);
    border: 1px solid var(--line);
    transition: all 0.2s ease;
  }
  .chip-option:hover {
    background: var(--green-deep);
    color: var(--cream-light);
    border-color: var(--green-deep);
    transform: translateY(-1px);
    box-shadow: 0 4px 12px rgba(26,46,26,0.15);
  }
  .chip-option:hover .chip-icon {
    transform: scale(1.1);
  }
  .chip-icon {
    transition: transform 0.2s ease;
  }

  /* Action button */
  .action-btn {
    background: var(--paper);
    border: 1px solid var(--line);
    transition: all 0.2s ease;
  }
  .action-btn:not(:disabled):hover {
    background: var(--green-deep);
    color: var(--cream-light);
    border-color: var(--green-deep);
  }
  .action-btn:disabled {
    opacity: 0.35;
    cursor: not-allowed;
  }

  /* Product card */
  .product-card {
    background: var(--cream-light);
    border: 1px solid var(--line);
    transition: all 0.25s ease;
  }
  .product-card:hover {
    border-color: var(--green-soft);
    box-shadow: 0 8px 24px rgba(26,46,26,0.08);
    transform: translateY(-2px);
  }

  /* Mic button states */
  .mic-recording {
    background: var(--rust) !important;
    color: var(--cream-light) !important;
    animation: pulseGreen 1.2s infinite;
  }

  /* Decorative top bar */
  .deco-line {
    background: linear-gradient(90deg,
      transparent 0%,
      var(--sand) 20%,
      var(--green-deep) 50%,
      var(--sand) 80%,
      transparent 100%
    );
    height: 1px;
  }

  /* Loading shimmer */
  .shimmer {
    background: linear-gradient(90deg,
      var(--cream-light) 0%,
      var(--cream) 50%,
      var(--cream-light) 100%
    );
    background-size: 200% 100%;
    animation: shimmer 1.5s linear infinite;
  }

  /* Typing dots */
  .typing-dot {
    width: 6px; height: 6px;
    background: var(--green-mid);
    border-radius: 50%;
    display: inline-block;
    margin: 0 1px;
    animation: typewriterDot 1.4s infinite;
  }
  .typing-dot:nth-child(2) { animation-delay: 0.2s; }
  .typing-dot:nth-child(3) { animation-delay: 0.4s; }

  /* Modal */
  .modal-backdrop {
    background: rgba(26,46,26,0.4);
    backdrop-filter: blur(4px);
  }

  /* Surface calculator inputs */
  .surface-input {
    background: var(--paper);
    border: 1px solid var(--line);
    font-variant-numeric: tabular-nums;
  }
  .surface-input:focus {
    outline: none;
    border-color: var(--green-mid);
    box-shadow: 0 0 0 3px rgba(45,90,45,0.1);
  }

  /* Badge */
  .badge {
    font-size: 0.65rem;
    font-weight: 600;
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }
</style>
</head>

<body class="min-h-screen">

<div id="root"></div>

<script type="text/babel" data-presets="env,react">
const { useState, useEffect, useRef, useCallback } = React;

// ========================================================================
// CONFIG
// ========================================================================

const API_ENDPOINT = '/api/fabien-v2';
const STORAGE_KEY  = 'fabien_v4_conversation';
const FAIREKO_PHONE = 'hello@nbsdistribution.eu';
const FAIREKO_SHOP  = 'https://www.faireko.be/shop';

// Default actions when backend doesn't provide them yet
const DEFAULT_ACTIONS = [
  { id: 'guide',  label: 'Guide de mise en œuvre', icon: '📘', enabled: false },
  { id: 'recap',  label: 'Récapitulatif',          icon: '📋', enabled: false },
  { id: 'panier', label: 'Panier',                 icon: '🛒', enabled: false },
  { id: 'expert', label: 'Appeler un expert',      icon: '📞', enabled: true  },
];

// ========================================================================
// UTILITIES
// ========================================================================

const formatMessage = (text) => {
  if (!text) return '';
  // Bold **text**
  let html = text.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
  // Italic *text*
  html = html.replace(/(?<!\*)\*([^\*]+)\*(?!\*)/g, '<em>$1</em>');
  // Newlines
  html = html.replace(/\n/g, '<br/>');
  return html;
};

const loadConversation = () => {
  try {
    const stored = localStorage.getItem(STORAGE_KEY);
    return stored ? JSON.parse(stored) : null;
  } catch { return null; }
};

const saveConversation = (data) => {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(data)); } catch {}
};

// ========================================================================
// COMPONENTS
// ========================================================================

const Header = ({ onReset, onCalculator }) => (
  <header className="relative">
    <div className="deco-line"></div>
    <div className="max-w-3xl mx-auto px-6 py-5 flex items-center justify-between">
      <div className="flex items-center gap-3">
        <div className="relative">
          <div className="w-10 h-10 rounded-full flex items-center justify-center font-display text-xl font-semibold"
               style={{background:'var(--green-deep)', color:'var(--cream-light)'}}>
            F
          </div>
          <span className="absolute -bottom-0.5 -right-0.5 w-3 h-3 rounded-full border-2"
                style={{background:'var(--moss)', borderColor:'var(--paper)'}}></span>
        </div>
        <div>
          <h1 className="font-display text-xl leading-none" style={{color:'var(--green-deep)'}}>
            Fabien
          </h1>
          <p className="text-xs mt-0.5" style={{color:'var(--ink-soft)'}}>
            Conseiller technique FAIRĒKO · <span className="badge" style={{color:'var(--rust)'}}>BETA</span>
          </p>
        </div>
      </div>
      <div className="flex items-center gap-2">
        <button onClick={onCalculator}
                className="action-btn btn-hover px-3 py-1.5 rounded-md text-sm flex items-center gap-1.5"
                title="Calculatrice m²">
          <span>📐</span>
          <span className="hidden sm:inline">m²</span>
        </button>
        <button onClick={onReset}
                className="action-btn btn-hover px-3 py-1.5 rounded-md text-sm flex items-center gap-1.5"
                title="Nouvelle conversation">
          <span>↻</span>
          <span className="hidden sm:inline">Nouvelle</span>
        </button>
      </div>
    </div>
    <div className="deco-line"></div>
  </header>
);

const BetaBanner = () => (
  <div className="max-w-3xl mx-auto px-6 pt-4">
    <div className="text-xs leading-relaxed p-3 rounded-md flex gap-2"
         style={{background:'var(--cream-light)', color:'var(--ink-soft)', border:'1px solid var(--line-soft)'}}>
      <span className="text-base leading-none">⚠️</span>
      <span>
        Fabien est en version BETA. Ses recommandations sont indicatives et doivent être validées
        par un professionnel avant tout chantier. Pour toute question critique :{' '}
        <a href={`mailto:${FAIREKO_PHONE}`} className="font-medium underline decoration-dotted"
           style={{color:'var(--green-deep)'}}>
          {FAIREKO_PHONE}
        </a>
      </span>
    </div>
  </div>
);

const Welcome = ({ onStart }) => {
  const starters = [
    { icon:'🧱', label:'Enduire un mur extérieur à la chaux' },
    { icon:'💧', label:'Traiter un mur humide avec salpêtre' },
    { icon:'🌿', label:'Isoler par l\'extérieur en biosourcé' },
    { icon:'🏛️', label:'Rénover un bâti ancien en moellons' },
  ];
  return (
    <div className="max-w-3xl mx-auto px-6 py-10 text-center anim-fade-up">
      <div className="inline-block mb-5 px-4 py-1.5 rounded-full text-xs font-medium"
           style={{background:'var(--cream)', color:'var(--green-deep)', letterSpacing:'0.05em'}}>
        ÉCO-CONSTRUCTION · WALLONIE & BRUXELLES
      </div>
      <h2 className="font-display text-4xl md:text-5xl leading-tight mb-4"
          style={{color:'var(--green-deep)'}}>
        Salut, je suis <em>Fabien</em>.
      </h2>
      <p className="font-display italic text-lg md:text-xl mb-8 max-w-xl mx-auto"
         style={{color:'var(--ink-soft)'}}>
        Ancien chef de chantier, je connais le bâti ancien wallon
        et les matériaux biosourcés sur le bout des doigts.
      </p>
      <p className="text-sm mb-6" style={{color:'var(--ink-soft)'}}>
        Décris ton chantier ou choisis un sujet pour commencer&nbsp;:

      <div className="grid grid-cols-1 sm:grid-cols-2 gap-2.5 max-w-xl mx-auto">

const UserMessage = ({ text }) => (
  <div className="anim-fade-up flex justify-end mb-4">
    <div className="max-w-[80%] px-4 py-3 rounded-2xl rounded-br-sm text-sm leading-relaxed"
         style={{background:'var(--green-deep)', color:'var(--cream-light)'}}>
      {text}
    </div>
  </div>
);

const ProductCard = ({ product, onAdd }) => (
  <div className="product-card rounded-lg p-3 flex items-start gap-3">
    <div className="w-10 h-10 rounded-md flex-shrink-0 flex items-center justify-center text-lg"
         style={{background:'var(--green-deep)', color:'var(--cream-light)'}}>
      🛍️
    </div>
    <div className="flex-1 min-w-0">
      <div className="text-sm font-semibold leading-tight" style={{color:'var(--green-deep)'}}>
        {product.name}
      </div>
      <div className="text-xs mt-1 font-mono" style={{color:'var(--ink-soft)'}}>
        ID #{product.id}
      </div>
    </div>
    <button onClick={() => onAdd(product)}
            className="text-xs px-2.5 py-1 rounded font-medium btn-hover whitespace-nowrap"
            style={{background:'var(--green-deep)', color:'var(--cream-light)'}}>
      + voir
    </button>
  </div>
);

const QuickOptions = ({ question, options, onSelect, disabled }) => {
  if (!options || options.length === 0) return null;
  return (
    <div className="mt-4 pt-3 border-t" style={{borderColor:'var(--line-soft)'}}>
      {question && (
        <p className="text-sm font-medium mb-2.5 italic"
           style={{color:'var(--green-mid)', fontFamily:'Playfair Display'}}>
          {question}
        </p>
      )}
      <div className="flex flex-wrap gap-2">
        {options.map((opt, i) => (
          <button key={i}
                  onClick={() => !disabled && onSelect(opt.label)}
                  disabled={disabled}
                  className="chip-option btn-hover px-3.5 py-2 rounded-full text-sm flex items-center gap-2 disabled:opacity-50"
                  style={{animationDelay:`${i*60}ms`}}>
            {opt.icon && <span className="chip-icon text-base">{opt.icon}</span>}
            <span className="font-medium">{opt.label}</span>
          </button>
        ))}
      </div>
    </div>
  );
};

const AssistantMessage = ({ data, onQuickSelect, isLast }) => {
  const message = data.message || '';
  const products = data.produits_suggeres || [];
  const quickOptions = data.quick_options || [];
  const quickQuestion = data.quick_options_question || '';

  return (
    <div className="anim-fade-up mb-6">
      <div className="flex items-start gap-3">
        <div className="w-8 h-8 rounded-full flex-shrink-0 flex items-center justify-center font-display text-sm font-semibold"
             style={{background:'var(--green-deep)', color:'var(--cream-light)'}}>
          F
        </div>
        <div className="flex-1 min-w-0">
          <div className="px-4 py-3 rounded-2xl rounded-tl-sm grain relative"
               style={{background:'var(--paper)', border:'1px solid var(--line)'}}>
            <div className="msg-content text-sm leading-relaxed"
                 style={{color:'var(--ink)'}}
                 dangerouslySetInnerHTML={{__html: formatMessage(message)}} />

            {products.length > 0 && (
              <div className="mt-4 space-y-2">
                {products.map((p, i) => (
                  <ProductCard key={i} product={p}
                               onAdd={(prod) => onQuickSelect(`Détails sur ${prod.name}`)} />
                ))}
              </div>
            )}

            {isLast && (
              <QuickOptions question={quickQuestion}
                            options={quickOptions}
                            onSelect={onQuickSelect} />
            )}
          </div>
        </div>
      </div>
    </div>
  );
};

const ThinkingMessage = () => (
  <div className="anim-fade-up mb-6">
    <div className="flex items-start gap-3">
      <div className="w-8 h-8 rounded-full flex-shrink-0 flex items-center justify-center font-display text-sm font-semibold anim-pulse"
           style={{background:'var(--green-deep)', color:'var(--cream-light)'}}>
        F
      </div>
      <div className="flex-1">
        <div className="inline-block px-4 py-3 rounded-2xl rounded-tl-sm"
             style={{background:'var(--paper)', border:'1px solid var(--line)'}}>
          <span className="typing-dot"></span>
          <span className="typing-dot"></span>
          <span className="typing-dot"></span>
          <span className="ml-2 text-xs italic" style={{color:'var(--ink-soft)'}}>
            Fabien réfléchit…
          </span>
        </div>
      </div>
    </div>
  </div>
);

const InputBar = ({ value, onChange, onSubmit, onMicToggle, recording, disabled }) => {
  const handleKeyDown = (e) => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      onSubmit();
    }
  };
  return (
    <div className="relative flex items-end gap-2 p-2 rounded-2xl"
         style={{background:'var(--paper)', border:'1.5px solid var(--line)'}}>
      <button onClick={onMicToggle}
              disabled={disabled}
              className={`btn-hover px-3 py-2.5 rounded-xl text-base flex-shrink-0 ${recording ? 'mic-recording' : ''}`}
              style={!recording ? {background:'var(--cream-light)', color:'var(--green-deep)'} : {}}
              title={recording ? 'Arrêter la dictée' : 'Dicter à la voix'}>
        {recording ? '⏹' : '🎙️'}
      </button>
      <textarea value={value}
                onChange={(e) => onChange(e.target.value)}
                onKeyDown={handleKeyDown}
                disabled={disabled}
                placeholder={recording ? 'Parle, je t\'écoute…' : 'Écris ta question, ou choisis une option ci-dessus…'}
                rows={1}
                className="flex-1 resize-none bg-transparent border-0 outline-none px-2 py-2.5 text-sm leading-relaxed"
                style={{maxHeight:'140px', color:'var(--ink)'}}
                ref={(el) => {
                  if (el) {
                    el.style.height = 'auto';
                    el.style.height = Math.min(el.scrollHeight, 140) + 'px';
                  }
                }} />
      <button onClick={onSubmit}
              disabled={disabled || !value.trim()}
              className="btn-hover px-4 py-2.5 rounded-xl text-sm font-medium flex-shrink-0 disabled:opacity-30"
              style={{background:'var(--green-deep)', color:'var(--cream-light)'}}>
        ↑
      </button>
    </div>
  );
};

const ActionsBar = ({ actions, onAction }) => (
  <div className="flex flex-wrap gap-2 mt-3 justify-center">
    {actions.map((a) => (
      <button key={a.id}
              onClick={() => a.enabled && onAction(a.id)}
              disabled={!a.enabled}
              className="action-btn btn-hover px-3 py-2 rounded-lg text-xs font-medium flex items-center gap-1.5">
        <span>{a.icon}</span>
        <span>{a.label}</span>
      </button>
    ))}
  </div>
);

// ========================================================================
// MODALS
// ========================================================================

const Modal = ({ open, onClose, title, children, size='md' }) => {
  if (!open) return null;
  const sizeClass = { sm:'max-w-md', md:'max-w-lg', lg:'max-w-2xl', xl:'max-w-4xl' }[size];
  return (
    <div className="fixed inset-0 z-50 flex items-center justify-center p-4 modal-backdrop anim-fade-up"
         onClick={onClose}>
      <div className={`w-full ${sizeClass} rounded-xl shadow-2xl max-h-[90vh] overflow-hidden flex flex-col`}
           style={{background:'var(--paper)', border:'1px solid var(--line)'}}
           onClick={(e) => e.stopPropagation()}>
        <div className="px-6 py-4 flex items-center justify-between border-b"
             style={{borderColor:'var(--line)'}}>
          <h3 className="font-display text-xl" style={{color:'var(--green-deep)'}}>{title}</h3>
          <button onClick={onClose}
                  className="text-2xl leading-none hover:opacity-60"
                  style={{color:'var(--ink-soft)'}}>×</button>
        </div>
        <div className="flex-1 overflow-y-auto px-6 py-5">
          {children}
        </div>
      </div>
    </div>
  );
};

const SurfaceCalculator = ({ open, onClose }) => {
  const [parois, setParois] = useState([
    { id: 1, name: 'Façade nord',  longueur: '', hauteur: '', deduc: '' },
    { id: 2, name: 'Façade sud',   longueur: '', hauteur: '', deduc: '' },
  ]);
  const [conso, setConso] = useState(15); // kg/m² par défaut

  const addParoi = () => setParois([...parois, {
    id: Date.now(), name: `Paroi ${parois.length+1}`, longueur:'', hauteur:'', deduc:''
  }]);
  const removeParoi = (id) => setParois(parois.filter(p => p.id !== id));
  const updateParoi = (id, field, value) => {
    setParois(parois.map(p => p.id === id ? {...p, [field]: value} : p));
  };

  const surfaceParoi = (p) => {
    const L = parseFloat(p.longueur) || 0;
    const H = parseFloat(p.hauteur) || 0;
    const D = parseFloat(p.deduc) || 0;
    return Math.max(0, L*H - D);
  };
  const total = parois.reduce((s, p) => s + surfaceParoi(p), 0);
  const kgTotal = total * conso;

  return (
    <Modal open={open} onClose={onClose} title="Calculatrice de surface" size="lg">
      <p className="text-sm mb-5" style={{color:'var(--ink-soft)'}}>
        Saisis tes parois pour calculer la surface totale et la quantité de produit nécessaire.
        Utilise <em>Déduc.</em> pour soustraire les ouvertures (fenêtres, portes).
      </p>

      <div className="space-y-2 mb-5">
        <div className="grid grid-cols-12 gap-2 px-2 text-xs font-medium uppercase tracking-wide"
             style={{color:'var(--ink-soft)', letterSpacing:'0.08em'}}>
          <div className="col-span-3">Paroi</div>
          <div className="col-span-2 text-right">Long. (m)</div>
          <div className="col-span-2 text-right">Haut. (m)</div>
          <div className="col-span-2 text-right">Déduc. (m²)</div>
          <div className="col-span-2 text-right">Surface</div>
          <div className="col-span-1"></div>
        </div>

const RecapModal = ({ open, onClose, conversation }) => {
  const userMessages = conversation.filter(m => m.role === 'user');
  const assistantMessages = conversation.filter(m => m.role === 'assistant');
  const allProducts = [];
  assistantMessages.forEach(m => {
    if (m.data && m.data.produits_suggeres) {
      m.data.produits_suggeres.forEach(p => {
        if (!allProducts.find(x => x.id === p.id)) allProducts.push(p);
      });
    }
  });

  const handleExport = () => {
    const date = new Date().toLocaleString('fr-BE');
    const parts = ['# Récapitulatif chantier — Fabien FAIRĒKO', '', `Date : ${date}`, ''];
    parts.push('## Échanges');
    conversation.forEach(m => {
      if (m.role === 'user') {
        parts.push(`\n**Toi :** ${m.text}`);
      } else if (m.role === 'assistant' && m.data) {
        parts.push(`\n**Fabien :** ${m.data.message}`);
      }
    });
    if (allProducts.length > 0) {
      parts.push('\n## Produits évoqués');
      allProducts.forEach(p => parts.push(`- ${p.name} (ID ${p.id})`));
    }
    parts.push(`\n---\nContact expert : ${FAIREKO_PHONE}`);

    const blob = new Blob([parts.join('\n')], {type:'text/markdown;charset=utf-8'});
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = `recap-fabien-${Date.now()}.md`;
    a.click(); URL.revokeObjectURL(url);
  };

  return (
    <Modal open={open} onClose={onClose} title="Récapitulatif" size="lg">
      <div className="text-xs mb-4 px-3 py-2 rounded font-mono"
           style={{background:'var(--cream-light)', color:'var(--ink-soft)'}}>
        {userMessages.length} question(s) · {assistantMessages.length} réponse(s) · {allProducts.length} produit(s)
      </div>

      <div className="space-y-4 mb-5">
        {conversation.map((m, i) => (
          <div key={i} className="text-sm">
            {m.role === 'user' ? (
              <div className="pl-3 border-l-2" style={{borderColor:'var(--green-mid)'}}>
                <div className="text-xs font-medium uppercase tracking-wide mb-1"
                     style={{color:'var(--green-deep)'}}>Toi</div>
                <div>{m.text}</div>
              </div>
            ) : m.data ? (
              <div className="pl-3 border-l-2" style={{borderColor:'var(--sand)'}}>
                <div className="text-xs font-medium uppercase tracking-wide mb-1"
                     style={{color:'var(--sand-deep)'}}>Fabien</div>
                <div className="msg-content"
                     dangerouslySetInnerHTML={{__html: formatMessage(m.data.message)}} />
              </div>
            ) : null}
          </div>
        ))}
      </div>

      {allProducts.length > 0 && (
        <div className="mb-5">
          <h4 className="font-display text-base mb-2" style={{color:'var(--green-deep)'}}>
            Produits évoqués
          </h4>
          <ul className="space-y-1.5">
            {allProducts.map((p, i) => (
              <li key={i} className="text-sm flex items-center gap-2">

                <span className="font-medium">{p.name}</span>

          </ul>
        </div>
      )}

      <button onClick={handleExport}

};

// ========================================================================
// MAIN APP
// ========================================================================

const App = () => {
  const [conversation, setConversation] = useState([]);
  const [input, setInput] = useState('');
  const [loading, setLoading] = useState(false);
  const [recording, setRecording] = useState(false);
  const [modal, setModal] = useState(null); // 'calc' | 'recap' | 'expert' | 'guide' | 'panier'
  const recognitionRef = useRef(null);
  const messagesEndRef = useRef(null);

  // ----- Init: try restore conversation -----
  useEffect(() => {
    const stored = loadConversation();
    if (stored && Array.isArray(stored) && stored.length > 0) {
      setConversation(stored);
    }
  }, []);

  // ----- Persist conversation -----
  useEffect(() => {
    if (conversation.length > 0) saveConversation(conversation);
  }, [conversation]);

  // ----- Auto-scroll -----
  useEffect(() => {
    messagesEndRef.current?.scrollIntoView({ behavior: 'smooth', block: 'end' });
  }, [conversation, loading]);

  // ----- Voice input setup (Web Speech API) -----
  useEffect(() => {
    const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (!SR) return;
    const rec = new SR();
    rec.lang = 'fr-FR';
    rec.continuous = false;
    rec.interimResults = true;
    rec.onresult = (e) => {
      let t = '';
      for (let i = e.resultIndex; i < e.results.length; i++) t += e.results[i][0].transcript;
      setInput(t);
    };
    rec.onend = () => setRecording(false);
    rec.onerror = () => setRecording(false);
    recognitionRef.current = rec;
  }, []);

  const toggleMic = () => {
    if (!recognitionRef.current) {
      alert('La dictée vocale n\'est pas supportée par ce navigateur.\nUtilise Chrome, Edge ou Safari.');
      return;
    }
    if (recording) {
      recognitionRef.current.stop();
      setRecording(false);
    } else {
      try {
        recognitionRef.current.start();
        setRecording(true);
      } catch (e) {
        // Already started
      }
    }
  };

  // ----- Send message -----
  const sendMessage = async (textOverride) => {
    const text = (textOverride !== undefined ? textOverride : input).trim();
    if (!text || loading) return;

    // Build conversation history for backend (Anthropic messages format)
    const userMsg = { role: 'user', text };
    const newConv = [...conversation, userMsg];
    setConversation(newConv);
    setInput('');
    setLoading(true);

    // Backend expects { messages: [{role, content}] }
    const apiMessages = newConv.map(m => {
      if (m.role === 'user') return { role: 'user', content: m.text };
      // assistant: send back the message text only (the JSON wrapper isn't needed for LLM context)
      return { role: 'assistant', content: m.data?.message || '' };
    });

    try {
      const res = await fetch(API_ENDPOINT, {
        method: 'POST',
        headers: {'Content-Type':'application/json'},
        body: JSON.stringify({ messages: apiMessages })
      });
      const data = await res.json();

      if (!data.success && !data.message) {
        setConversation([...newConv, {
          role: 'assistant',
          data: {
            message: 'Désolé, j\'ai eu un souci technique. Réessaie ou contacte ' + FAIREKO_PHONE + '.',
            actions: DEFAULT_ACTIONS,
            quick_options: [],
          }
        }]);
      } else {
        // Ensure actions present
        if (!data.actions || !Array.isArray(data.actions) || data.actions.length === 0) {
          data.actions = DEFAULT_ACTIONS.map(a => ({...a, enabled: a.id === 'expert'}));
        }
        setConversation([...newConv, { role:'assistant', data }]);
      }
    } catch (err) {
      setConversation([...newConv, {
        role: 'assistant',
        data: {
          message: 'Connexion impossible avec Fabien. Vérifie ta connexion ou contacte ' + FAIREKO_PHONE + '.',
          actions: DEFAULT_ACTIONS,
          quick_options: [],
        }
      }]);
    } finally {
      setLoading(false);
    }
  };

  // ----- Reset conversation -----
  const handleReset = () => {
    if (conversation.length === 0 || confirm('Démarrer une nouvelle conversation ?\nL\'historique actuel sera perdu.')) {
      setConversation([]);
      localStorage.removeItem(STORAGE_KEY);
    }
  };

  // ----- Action handler -----
  const handleAction = (id) => {
    setModal(id);
  };

  // Get latest actions from last assistant message, or defaults
  const lastAssistant = [...conversation].reverse().find(m => m.role === 'assistant' && m.data);
  const currentActions = lastAssistant?.data?.actions || DEFAULT_ACTIONS;

  // Collect all unique products in conversation for the panier
  const allProducts = [];
  conversation.forEach(m => {
    if (m.role === 'assistant' && m.data?.produits_suggeres) {
      m.data.produits_suggeres.forEach(p => {
        if (!allProducts.find(x => x.id === p.id)) allProducts.push(p);
      });
    }
  });

  return (
    <div className="relative min-h-screen flex flex-col">
      <Header onReset={handleReset} onCalculator={() => setModal('calc')} />

      {conversation.length === 0 && <BetaBanner />}

      <main className="flex-1 max-w-3xl mx-auto w-full px-4 sm:px-6 py-4 relative">
        {conversation.length === 0 ? (
          <Welcome onStart={(text) => sendMessage(text)} />
        ) : (
          <div className="space-y-1">
            {conversation.map((m, i) => {
              const isLast = i === conversation.length - 1;
              if (m.role === 'user') return <UserMessage key={i} text={m.text} />;
              return <AssistantMessage key={i} data={m.data} isLast={isLast && !loading}
                                       onQuickSelect={(text) => sendMessage(text)} />;
            })}
            {loading && <ThinkingMessage />}
            <div ref={messagesEndRef}></div>
          </div>
        )}
      </main>

      {/* Sticky bottom: input + actions */}
      <footer className="sticky bottom-0 z-20 px-4 sm:px-6 pb-4 pt-3"
              style={{background:'linear-gradient(to top, var(--paper) 70%, transparent)'}}>
        <div className="max-w-3xl mx-auto">
          <InputBar value={input}
                    onChange={setInput}
                    onSubmit={() => sendMessage()}
                    onMicToggle={toggleMic}
                    recording={recording}
                    disabled={loading} />
          <ActionsBar actions={currentActions} onAction={handleAction} />
        </div>
      </footer>

      {/* Modals */}
      <SurfaceCalculator open={modal === 'calc'}   onClose={() => setModal(null)} />
      <RecapModal        open={modal === 'recap'}  onClose={() => setModal(null)} conversation={conversation} />
      <ExpertModal       open={modal === 'expert'} onClose={() => setModal(null)} />
      <GuideModal        open={modal === 'guide'}  onClose={() => setModal(null)} conversation={conversation} />
      <PanierModal       open={modal === 'panier'} onClose={() => setModal(null)} products={allProducts} />
    </div>
  );
};

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
