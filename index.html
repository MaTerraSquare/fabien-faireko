<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fabien — Conseiller technique FAIRĒKO</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;1,400&family=DM+Sans:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

<style>
  :root {
    --green-deep:    #1a2e1a;
    --green-mid:     #2d5a2d;
    --green-soft:    #4a7a4a;
    --cream:         #f5f1e8;
    --cream-light:   #faf7f0;
    --sand:          #c8b896;
    --sand-deep:     #8a7a5c;
    --paper:         #fdfbf6;
    --ink:           #1a1a1a;
    --ink-soft:      #4a4a4a;
    --line:          #e5dfd0;
    --line-soft:     #f0ebd9;
    --rust:          #b85c2c;
    --moss:          #6b7d4a;
  }

  html, body {
    background: var(--paper);
    color: var(--ink);
    font-family: 'DM Sans', -apple-system, sans-serif;
    -webkit-font-smoothing: antialiased;
  }

  .font-display { font-family: 'Playfair Display', serif; }
  .font-mono    { font-family: 'DM Mono', monospace; }

  /* Subtle paper grain */
  body::before {
    content: '';
    position: fixed; inset: 0;
    pointer-events: none;
    z-index: 0;
    background-image:
      radial-gradient(circle at 20% 30%, rgba(200,184,150,0.08) 0%, transparent 40%),
      radial-gradient(circle at 80% 70%, rgba(74,122,74,0.04) 0%, transparent 50%);
  }

  /* Grain overlay */
  .grain::after {
    content: '';
    position: absolute; inset: 0;
    pointer-events: none;
    opacity: 0.04;
    mix-blend-mode: multiply;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='3' /%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
  }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 8px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--sand); border-radius: 4px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--sand-deep); }

  /* Animations */
  @keyframes fadeInUp {
    from { opacity: 0; transform: translateY(8px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  @keyframes pulseGreen {
    0%, 100% { box-shadow: 0 0 0 0 rgba(45,90,45,0.4); }
    50%      { box-shadow: 0 0 0 10px rgba(45,90,45,0); }
  }
  @keyframes typewriterDot {
    0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
    30%           { transform: translateY(-3px); opacity: 1; }
  }
  @keyframes shimmer {
    0%   { background-position: -200% 0; }
    100% { background-position: 200% 0; }
  }

  .anim-fade-up    { animation: fadeInUp 0.4s cubic-bezier(0.16, 1, 0.3, 1) both; }
  .anim-pulse      { animation: pulseGreen 2s ease-in-out infinite; }

  /* Markdown-ish styling for messages */
  .msg-content strong { font-weight: 600; color: var(--green-deep); }
  .msg-content em     { font-style: italic; color: var(--ink-soft); }

  /* Button hover lift */
  .btn-hover {
    transition: transform 0.15s ease, box-shadow 0.2s ease, background-color 0.2s ease;
  }
  .btn-hover:hover {
    transform: translateY(-1px);
  }
  .btn-hover:active {
    transform: translateY(0);
  }

  /* Quick option chip */
  .chip-option {
    background: var(--cream-light);
    border: 1px solid var(--line);
    transition: all 0.2s ease;
  }
  .chip-option:hover {
    background: var(--green-deep);
    color: var(--cream-light);
    border-color: var(--green-deep);
    transform: translateY(-1px);
    box-shadow: 0 4px 12px rgba(26,46,26,0.15);
  }
  .chip-option:hover .chip-icon {
    transform: scale(1.1);
  }
  .chip-icon {
    transition: transform 0.2s ease;
  }

  /* Action button */
  .action-btn {
    background: var(--paper);
    border: 1px solid var(--line);
    transition: all 0.2s ease;
  }
  .action-btn:not(:disabled):hover {
    background: var(--green-deep);
    color: var(--cream-light);
    border-color: var(--green-deep);
  }
  .action-btn:disabled {
    opacity: 0.35;
    cursor: not-allowed;
  }

  /* Product card */
  .product-card {
    background: var(--cream-light);
    border: 1px solid var(--line);
    transition: all 0.25s ease;
  }
  .product-card:hover {
    border-color: var(--green-soft);
    box-shadow: 0 8px 24px rgba(26,46,26,0.08);
    transform: translateY(-2px);
  }

  /* Mic button states */
  .mic-recording {
    background: var(--rust) !important;
    color: var(--cream-light) !important;
    animation: pulseGreen 1.2s infinite;
  }

  /* Decorative top bar */
  .deco-line {
    background: linear-gradient(90deg,
      transparent 0%,
      var(--sand) 20%,
      var(--green-deep) 50%,
      var(--sand) 80%,
      transparent 100%
    );
    height: 1px;
  }

  /* Loading shimmer */
  .shimmer {
    background: linear-gradient(90deg,
      var(--cream-light) 0%,
      var(--cream) 50%,
      var(--cream-light) 100%
    );
    background-size: 200% 100%;
    animation: shimmer 1.5s linear infinite;
  }

  /* Typing dots */
  .typing-dot {
    width: 6px; height: 6px;
    background: var(--green-mid);
    border-radius: 50%;
    display: inline-block;
    margin: 0 1px;
    animation: typewriterDot 1.4s infinite;
  }
  .typing-dot:nth-child(2) { animation-delay: 0.2s; }
  .typing-dot:nth-child(3) { animation-delay: 0.4s; }

  /* Modal */
  .modal-backdrop {
    background: rgba(26,46,26,0.4);
    backdrop-filter: blur(4px);
  }

  /* Page dédiée Fabien — pleine viewport */
  html, body {
    height: 100%;
    overflow: hidden; /* la conversation gère son propre scroll */
  }
  .fabien-page {
    height: 100vh;
    width: 100vw;
    display: flex;
    flex-direction: column;
    background: var(--paper);
    position: relative;
  }
  .fabien-page-main {
    flex: 1;
    overflow-y: auto;
    overflow-x: hidden;
    width: 100%;
  }
  .fabien-page-content {
    max-width: 880px;
    margin: 0 auto;
    padding: 24px 24px 12px;
  }
  .fabien-page-footer {
    flex-shrink: 0;
    border-top: 1px solid var(--line-soft);
    background: var(--paper);
    padding: 14px 24px 18px;
  }
  .fabien-page-footer-inner {
    max-width: 880px;
    margin: 0 auto;
  }

  /* Mobile */
  @media (max-width: 768px) {
    .fabien-page-content {
      padding: 16px 16px 10px;
    }
    .fabien-page-footer {
      padding: 12px 16px 14px;
    }
  }

  /* Tableau devis système */
  .systeme-table {
    width: 100%;
    border-collapse: separate;
    border-spacing: 0;
    font-size: 0.8rem;
  }
  .systeme-table th {
    background: var(--green-deep);
    color: var(--cream-light);
    font-family: 'Playfair Display', serif;
    font-weight: 500;
    padding: 8px 10px;
    text-align: left;
    font-size: 0.75rem;
    letter-spacing: 0.04em;
  }
  .systeme-table th:first-child { border-top-left-radius: 6px; }
  .systeme-table th:last-child  { border-top-right-radius: 6px; }
  .systeme-table td {
    padding: 8px 10px;
    border-bottom: 1px solid var(--line-soft);
    vertical-align: top;
  }
  .systeme-table tbody tr:nth-child(odd) td {
    background: var(--cream-light);
  }
  .systeme-table tbody tr:hover td {
    background: var(--cream);
  }
  .systeme-table .role-badge {
    display: inline-block;
    width: 22px; height: 22px;
    border-radius: 50%;
    background: var(--green-deep);
    color: var(--cream-light);
    text-align: center;
    line-height: 22px;
    font-size: 0.7rem;
    font-weight: 600;
    margin-right: 6px;
  }
  .systeme-table tfoot td {
    background: var(--green-deep);
    color: var(--cream-light);
    font-weight: 600;
    border: none;
  }
  .systeme-table tfoot td:first-child { border-bottom-left-radius: 6px; }
  .systeme-table tfoot td:last-child  { border-bottom-right-radius: 6px; }
  .systeme-table .product-link {
    color: var(--green-deep);
    text-decoration: underline;
    text-decoration-color: var(--sand);
    text-underline-offset: 2px;
    font-weight: 500;
  }
  .systeme-table .product-link:hover {
    color: var(--green-mid);
  }
  .systeme-table .conso-cell {
    font-family: 'DM Mono', monospace;
    font-size: 0.7rem;
    text-align: right;
    white-space: nowrap;
  }
  .systeme-table .note-cell {
    font-size: 0.7rem;
    color: var(--ink-soft);
    font-style: italic;
  }

  /* Surface calculator inputs */
  .surface-input {
    background: var(--paper);
    border: 1px solid var(--line);
    font-variant-numeric: tabular-nums;
  }
  .surface-input:focus {
    outline: none;
    border-color: var(--green-mid);
    box-shadow: 0 0 0 3px rgba(45,90,45,0.1);
  }

  /* Badge */
  .badge {
    font-size: 0.65rem;
    font-weight: 600;
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }
</style>
</head>

<body class="min-h-screen">

<div id="root"></div>

<script type="text/babel" data-presets="env,react">
const { useState, useEffect, useRef, useCallback } = React;

// ========================================================================
// CONFIG
// ========================================================================

const API_ENDPOINT = '/api/fabien-v2';
const STORAGE_KEY  = 'fabien_v4_conversation';
const FAIREKO_PHONE = 'hello@nbsdistribution.eu';
const FAIREKO_SHOP  = 'https://www.faireko.be/shop';
const ODOO_BASE_URL = 'https://www.faireko.be';

// Hardcoded URLs Odoo for the products we know (fallback if backend doesn't provide website_url)
const PRODUCT_URLS = {
  759:  '/shop/cc-m-rest-restaura-nhl-35-759',
  760:  '/shop/cc-m-rest-s-restaura-s-nhl-35-760',
  761:  '/shop/cc-m-bas-base-nhl-5-761',
  762:  '/shop/cc-m-ad-adherecal-nhl-5-ite-762',
  763:  '/shop/cc-m-hum-humical-763',
  764:  '/shop/cc-l-nhl35-chaux-hydraulique-nhl-35-764',
  768:  '/shop/cc-l-cl9osp-cl90-sp-768',
  1918: '/shop/cc-m-therm-thermcal-10kg-1918',
  9276: '/shop/limewash-9276',
  9465: '/shop/genr-sable-sable-05-generique-9465',
  9471: '/shop/gordillos-cal-en-pasta-envejecida-cl-90-spl-9471',
};

const productUrl = (id) => {
  const path = PRODUCT_URLS[id] || `/shop?search=${id}`;
  return `${ODOO_BASE_URL}${path}`;
};

// Default actions when backend doesn't provide them yet
const DEFAULT_ACTIONS = [
  { id: 'guide',  label: 'Guide de mise en œuvre', icon: '📘', enabled: false },
  { id: 'recap',  label: 'Récapitulatif',          icon: '📋', enabled: false },
  { id: 'panier', label: 'Panier',                 icon: '🛒', enabled: false },
  { id: 'expert', label: 'Appeler un expert',      icon: '📞', enabled: true  },
];

// ========================================================================
// UTILITIES
// ========================================================================

const formatMessage = (text) => {
  if (!text) return '';
  // Bold **text**
  let html = text.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
  // Italic *text*
  html = html.replace(/(?<!\*)\*([^\*]+)\*(?!\*)/g, '<em>$1</em>');
  // Newlines
  html = html.replace(/\n/g, '<br/>');
  return html;
};

const loadConversation = () => {
  try {
    const stored = localStorage.getItem(STORAGE_KEY);
    return stored ? JSON.parse(stored) : null;
  } catch { return null; }
};

const saveConversation = (data) => {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(data)); } catch {}
};

// ========================================================================
// COMPONENTS
// ========================================================================

const Header = ({ onReset, onCalculator }) => (
  <header className="relative flex-shrink-0" style={{background:'var(--paper)'}}>
    <div className="deco-line"></div>
    <div className="px-6 sm:px-8 py-4 flex items-center justify-between max-w-5xl mx-auto w-full">
      <div className="flex items-center gap-3">
        <div className="relative">
          <div className="w-12 h-12 rounded-full flex items-center justify-center font-display text-2xl font-semibold"
               style={{background:'var(--green-deep)', color:'var(--cream-light)'}}>
            F
          </div>
          <span className="absolute -bottom-0.5 -right-0.5 w-3 h-3 rounded-full border-2"
                style={{background:'var(--moss)', borderColor:'var(--paper)'}}></span>
        </div>
        <div>
          <h1 className="font-display text-xl sm:text-2xl leading-none" style={{color:'var(--green-deep)'}}>
            Fabien
          </h1>
          <p className="text-xs sm:text-sm mt-1" style={{color:'var(--ink-soft)'}}>
            Conseiller technique FAIRĒKO · <span className="badge" style={{color:'var(--rust)'}}>BETA</span>
          </p>
        </div>
      </div>
      <div className="flex items-center gap-2">
        <button onClick={onCalculator}
                className="action-btn btn-hover px-3 py-2 rounded-md text-sm flex items-center gap-1.5"
                title="Calculatrice m²">
          <span>📐</span>
          <span className="hidden sm:inline">Surface m²</span>
        </button>
        <button onClick={onReset}
                className="action-btn btn-hover px-3 py-2 rounded-md text-sm flex items-center gap-1.5"
                title="Nouvelle conversation">
          <span>↻</span>
          <span className="hidden sm:inline">Nouvelle</span>
        </button>
      </div>
    </div>
    <div className="deco-line"></div>
  </header>
);

const BetaBanner = () => (
  <div className="px-6 sm:px-8 pt-4 max-w-5xl mx-auto w-full flex-shrink-0">
    <div className="text-xs sm:text-sm leading-relaxed p-3 rounded-md flex gap-2"
         style={{background:'var(--cream-light)', color:'var(--ink-soft)', border:'1px solid var(--line-soft)'}}>
      <span className="text-base leading-none">⚠️</span>
      <span>
        Fabien est en version BETA. Ses recommandations sont indicatives et doivent être validées
        par un professionnel avant tout chantier. Pour toute question critique :{' '}
        <a href={`mailto:${FAIREKO_PHONE}`} className="font-medium underline decoration-dotted"
           style={{color:'var(--green-deep)'}}>
          {FAIREKO_PHONE}
        </a>
      </span>
    </div>
  </div>
);

const Welcome = ({ onStart }) => {
  const starters = [
    { icon:'🧱', label:'Enduire un mur extérieur à la chaux',  hint:'Système 3 couches, choix produits' },
    { icon:'💧', label:'Traiter un mur humide avec salpêtre',   hint:'Diagnostic + assainissement' },
    { icon:'🌿', label:'Isoler par l\'extérieur en biosourcé',   hint:'ETICS chanvre, fibre bois, liège' },
    { icon:'🏛️', label:'Rénover un bâti ancien en moellons',     hint:'Patrimoine wallon' },
  ];
  return (
    <div className="max-w-2xl mx-auto px-2 py-8 sm:py-12 text-center anim-fade-up">
      <div className="inline-block mb-5 px-4 py-1.5 rounded-full text-xs font-medium"
           style={{background:'var(--cream)', color:'var(--green-deep)', letterSpacing:'0.05em'}}>
        ÉCO-CONSTRUCTION · WALLONIE & BRUXELLES
      </div>
      <h2 className="font-display text-3xl sm:text-4xl md:text-5xl leading-tight mb-4"
          style={{color:'var(--green-deep)'}}>
        Salut, je suis <em>Fabien</em>.
      </h2>
      <p className="font-display italic text-base sm:text-lg md:text-xl mb-8 max-w-xl mx-auto"
         style={{color:'var(--ink-soft)'}}>
        Ancien chef de chantier, je connais le bâti ancien wallon
        et les matériaux biosourcés sur le bout des doigts.
      </p>
      <p className="text-sm mb-5" style={{color:'var(--ink-soft)'}}>
        Décris ton chantier ou choisis un sujet pour commencer&nbsp;:
      </p>
      <div className="grid grid-cols-1 sm:grid-cols-2 gap-3">
        {starters.map((s, i) => (
          <button key={i}
                  onClick={() => onStart(s.label)}
                  className="chip-option btn-hover px-4 py-4 rounded-xl text-left flex items-start gap-3 text-sm">
            <span className="chip-icon text-2xl flex-shrink-0">{s.icon}</span>
            <span className="flex-1">
              <span className="block font-medium leading-snug">{s.label}</span>
              <span className="block text-xs mt-0.5 opacity-70">{s.hint}</span>
            </span>
          </button>
        ))}
      </div>
      <p className="text-xs mt-8 italic" style={{color:'var(--ink-soft)'}}>
        Ou tape directement ta question dans la zone ci-dessous.
      </p>
    </div>
  );
};

const UserMessage = ({ text }) => (
  <div className="anim-fade-up flex justify-end mb-4">
    <div className="max-w-[80%] px-4 py-3 rounded-2xl rounded-br-sm text-sm leading-relaxed"
         style={{background:'var(--green-deep)', color:'var(--cream-light)'}}>
      {text}
    </div>
  </div>
);

const ProductCard = ({ product, onAdd }) => (
  <div className="product-card rounded-lg p-3 flex items-start gap-3">
    <div className="w-10 h-10 rounded-md flex-shrink-0 flex items-center justify-center text-lg"
         style={{background:'var(--green-deep)', color:'var(--cream-light)'}}>
      🛍️
    </div>
    <div className="flex-1 min-w-0">
      <a href={productUrl(product.id)} target="_blank" rel="noopener"
         className="text-sm font-semibold leading-tight hover:underline" style={{color:'var(--green-deep)'}}>
        {product.name}
      </a>
      <div className="text-xs mt-1 font-mono" style={{color:'var(--ink-soft)'}}>
        ID #{product.id}
      </div>
    </div>
    <a href={productUrl(product.id)} target="_blank" rel="noopener"
       className="text-xs px-2.5 py-1 rounded font-medium btn-hover whitespace-nowrap"
       style={{background:'var(--green-deep)', color:'var(--cream-light)'}}>
      Voir →
    </a>
  </div>
);

// ========================================================================
// SystemeTable — tableau type devis avec couches stratifiées
// ========================================================================

const SystemeTable = ({ systeme, surface, onSurfaceChange, onCalculator }) => {
  if (!systeme || !systeme.couches || systeme.couches.length === 0) return null;
  const m2 = parseFloat(surface) || 0;

  // Total kg / L par produit (pour totaux)
  const totalLine = (couche) => {
    return (couche.products || []).map(p => ({
      product: p,
      qty: m2 * (p.conso_value || 0),
    }));
  };

  return (
    <div className="mt-4 pt-3 border-t" style={{borderColor:'var(--line-soft)'}}>
      <div className="flex items-baseline justify-between mb-3 flex-wrap gap-2">
        <div>
          <div className="font-display text-base" style={{color:'var(--green-deep)'}}>
            Système recommandé
          </div>
          {systeme.support && (
            <div className="text-xs mt-0.5" style={{color:'var(--ink-soft)'}}>
              Support : <span className="font-medium">{systeme.support}</span>
              {systeme.logique && <span> · Logique <em>{systeme.logique.replace('_',' ')}</em></span>}
            </div>
          )}
        </div>
        <div className="flex items-center gap-2">
          <label className="text-xs" style={{color:'var(--ink-soft)'}}>Surface :</label>
          <input type="number" step="0.5" value={surface}
                 onChange={(e) => onSurfaceChange(e.target.value)}
                 className="surface-input rounded px-2 py-1 text-sm w-20 text-right font-mono" />
          <span className="text-xs" style={{color:'var(--ink-soft)'}}>m²</span>
          <button onClick={onCalculator}
                  className="text-xs btn-hover px-2 py-1 rounded"
                  style={{background:'var(--cream-light)', color:'var(--green-deep)', border:'1px solid var(--line)'}}
                  title="Calculatrice détaillée par paroi">
            📐
          </button>
        </div>
      </div>

      <div className="overflow-x-auto rounded-md border" style={{borderColor:'var(--line)'}}>
        <table className="systeme-table">
          <thead>
            <tr>
              <th>Étape</th>
              <th>Produit</th>
              <th className="text-right">Conso</th>
              <th className="text-right">Quantité</th>
            </tr>
          </thead>
          <tbody>
            {systeme.couches.map((couche, idx) => {
              const lines = totalLine(couche);
              return lines.map((line, lineIdx) => (
                <tr key={`${idx}-${lineIdx}`}>
                  {lineIdx === 0 && (
                    <td rowSpan={lines.length} style={{verticalAlign:'top'}}>
                      <span className="role-badge">{couche.ordre}</span>
                      <span className="font-medium">{couche.role}</span>
                      {couche.optional && <span className="badge ml-1" style={{color:'var(--rust)'}}>opt.</span>}
                      {couche.note && <div className="note-cell mt-1">{couche.note}</div>}
                    </td>
                  )}
                  <td>
                    <a href={productUrl(line.product.id)} target="_blank" rel="noopener"
                       className="product-link">
                      {line.product.name}
                    </a>
                    <div className="text-xs font-mono" style={{color:'var(--ink-soft)'}}>
                      ID #{line.product.id}
                    </div>
                    {line.product.note && (
                      <div className="note-cell mt-1">{line.product.note}</div>
                    )}
                  </td>
                  <td className="conso-cell">
                    {line.product.conso_value} {line.product.conso_unit}
                  </td>

const SurfaceCalculator = ({ open, onClose, systeme, initialSurface, onApplySurface }) => {
  const [parois, setParois] = useState([
    { id: 1, name: 'Façade nord',  longueur: '', hauteur: '', deduc: '' },
    { id: 2, name: 'Façade sud',   longueur: '', hauteur: '', deduc: '' },
  ]);

  const addParoi = () => setParois([...parois, {
    id: Date.now(), name: `Paroi ${parois.length+1}`, longueur:'', hauteur:'', deduc:''
  }]);
  const removeParoi = (id) => setParois(parois.filter(p => p.id !== id));
  const updateParoi = (id, field, value) => {
    setParois(parois.map(p => p.id === id ? {...p, [field]: value} : p));
  };

  const surfaceParoi = (p) => {
    const L = parseFloat(p.longueur) || 0;
    const H = parseFloat(p.hauteur) || 0;
    const D = parseFloat(p.deduc) || 0;
    return Math.max(0, L*H - D);
  };
  const total = parois.reduce((s, p) => s + surfaceParoi(p), 0);

  const handleApply = () => {
    if (onApplySurface && total > 0) {
      onApplySurface(total.toFixed(2));
      onClose();
    }
  };

  return (
    <Modal open={open} onClose={onClose} title="Calculatrice de surface" size="lg">
      <p className="text-sm mb-5" style={{color:'var(--ink-soft)'}}>
        Saisis tes parois pour calculer la surface totale.
        Utilise <em>Déduc.</em> pour soustraire les ouvertures (fenêtres, portes).
        {systeme && ' La surface s\'appliquera ensuite au système recommandé pour calculer toutes les couches.'}
      </p>

      <div className="space-y-2 mb-5">
        <div className="grid grid-cols-12 gap-2 px-2 text-xs font-medium uppercase tracking-wide"
             style={{color:'var(--ink-soft)', letterSpacing:'0.08em'}}>
          <div className="col-span-3">Paroi</div>
          <div className="col-span-2 text-right">Long. (m)</div>
          <div className="col-span-2 text-right">Haut. (m)</div>
          <div className="col-span-2 text-right">Déduc. (m²)</div>
          <div className="col-span-2 text-right">Surface</div>
          <div className="col-span-1"></div>
        </div>
        {parois.map((p) => (
          <div key={p.id} className="grid grid-cols-12 gap-2 items-center">
            <input type="text" value={p.name}
                   onChange={(e) => updateParoi(p.id, 'name', e.target.value)}
                   className="col-span-3 surface-input rounded px-2 py-1.5 text-sm" />
            <input type="number" step="0.01" value={p.longueur}
                   onChange={(e) => updateParoi(p.id, 'longueur', e.target.value)}
                   placeholder="0"
                   className="col-span-2 surface-input rounded px-2 py-1.5 text-sm text-right" />
            <input type="number" step="0.01" value={p.hauteur}
                   onChange={(e) => updateParoi(p.id, 'hauteur', e.target.value)}
                   placeholder="0"
                   className="col-span-2 surface-input rounded px-2 py-1.5 text-sm text-right" />
            <input type="number" step="0.01" value={p.deduc}
                   onChange={(e) => updateParoi(p.id, 'deduc', e.target.value)}
                   placeholder="0"
                   className="col-span-2 surface-input rounded px-2 py-1.5 text-sm text-right" />
            <div className="col-span-2 text-right text-sm font-mono font-semibold"
                 style={{color:'var(--green-deep)'}}>
              {surfaceParoi(p).toFixed(2)} m²
            </div>
            <button onClick={() => removeParoi(p.id)}
                    className="col-span-1 text-sm hover:opacity-60"
                    style={{color:'var(--rust)'}}>×</button>
          </div>
        ))}
      </div>

      <button onClick={addParoi}
              className="text-sm px-3 py-1.5 rounded border btn-hover"
              style={{background:'var(--cream-light)', borderColor:'var(--line)', color:'var(--green-deep)'}}>
        + Ajouter une paroi
      </button>

      <div className="mt-6 pt-5 border-t" style={{borderColor:'var(--line)'}}>
        <div className="p-4 rounded-lg mb-4"
             style={{background:'var(--green-deep)', color:'var(--cream-light)'}}>
          <div className="text-xs uppercase tracking-wide opacity-70">Surface totale</div>
          <div className="font-display text-3xl mt-1 font-mono">{total.toFixed(2)} <span className="text-lg opacity-70">m²</span></div>
        </div>

        {/* Multi-couches calc if systeme present */}
        {systeme && systeme.couches && total > 0 && (
          <div className="mb-4">
            <div className="text-xs font-medium uppercase tracking-wide mb-2"
                 style={{color:'var(--ink-soft)', letterSpacing:'0.08em'}}>
              Quantités par couche du système
            </div>
            <div className="rounded-lg overflow-hidden border" style={{borderColor:'var(--line)'}}>
              {systeme.couches.map((couche, i) => (
                <div key={i} className="px-3 py-2.5 border-b"
                     style={{background: i%2===0 ? 'var(--cream-light)' : 'var(--paper)',
                             borderColor:'var(--line-soft)'}}>
                  <div className="flex items-center gap-2 text-xs font-medium mb-1">
                    <span className="role-badge">{couche.ordre}</span>
                    <span style={{color:'var(--green-deep)'}}>{couche.role}</span>
                    {couche.optional && <span className="badge" style={{color:'var(--rust)'}}>opt.</span>}
                  </div>
                  {(couche.products || []).map((p, pi) => (
                    <div key={pi} className="text-xs ml-7 flex justify-between items-center font-mono">
                      <span style={{color:'var(--ink)'}}>{p.name}</span>
                      <span className="font-semibold" style={{color:'var(--green-deep)'}}>
                        {(total * (p.conso_value || 0)).toFixed(1)} {(p.conso_unit||'').split('/')[0]}
                      </span>
                    </div>
                  ))}
                </div>
              ))}
            </div>
          </div>
        )}

        <button onClick={handleApply} disabled={total <= 0}
                className="btn-hover w-full px-4 py-2.5 rounded-lg text-sm font-medium disabled:opacity-30"
                style={{background:'var(--green-deep)', color:'var(--cream-light)'}}>
          Appliquer cette surface ({total.toFixed(2)} m²)
        </button>
        <p className="text-xs mt-3 italic" style={{color:'var(--ink-soft)'}}>
          Estimations indicatives. Conso réelle dépend du produit, du support, et de l'épaisseur réelle.
        </p>
      </div>
    </Modal>
  );
};

  const userMessages = conversation.filter(m => m.role === 'user');

  assistantMessages.forEach(m => {
    if (m.data && m.data.produits_suggeres) {

        if (!allProducts.find(x => x.id === p.id)) allProducts.push(p);
      });
    }
  });

  const handleExport = () => {
    const date = new Date().toLocaleString('fr-BE');
    const parts = ['# Récapitulatif chantier — Fabien FAIRĒKO', '', `Date : ${date}`, ''];
    parts.push('## Échanges');
    conversation.forEach(m => {
      if (m.role === 'user') {
        parts.push(`\n**Toi :** ${m.text}`);
      } else if (m.role === 'assistant' && m.data) {
        parts.push(`\n**Fabien :** ${m.data.message}`);

    if (allProducts.length > 0) {
      parts.push('\n## Produits évoqués');
      allProducts.forEach(p => parts.push(`- ${p.name} (ID ${p.id})`));

    parts.push(`\n---\nContact expert : ${FAIREKO_PHONE}`);

    const blob = new Blob([parts.join('\n')], {type:'text/markdown;charset=utf-8'});

    a.href = url; a.download = `recap-fabien-${Date.now()}.md`;
    a.click(); URL.revokeObjectURL(url);

  return (

                          ID #{p.id}
                          {p.conso_value && ` · ${p.conso_value} ${p.conso_unit}`}
                        </div>
                        {p.note && <div className="text-xs italic mt-1" style={{color:'var(--ink-soft)'}}>{p.note}</div>}
                      </div>
                      <a href={productUrl(p.id)} target="_blank" rel="noopener"
                         className="text-xs px-2.5 py-1 rounded font-medium btn-hover ml-2 whitespace-nowrap"
                         style={{background:'var(--green-deep)', color:'var(--cream-light)'}}>
                        Voir →
                      </a>
                    </div>
                  ))}
                </div>
              </div>
            ))}
          </div>
        </>
      ) : products.length === 0 ? (
        <p className="text-sm" style={{color:'var(--ink-soft)'}}>
          Pas encore de produit identifié. Continue la conversation, Fabien suggérera des produits adaptés.
        </p>
      ) : (
        <ul className="space-y-2 mb-5">
          {products.map((p, i) => (
            <li key={i} className="flex items-center justify-between p-3 rounded-lg"
                style={{background:'var(--cream-light)'}}>
              <div>
                <a href={productUrl(p.id)} target="_blank" rel="noopener"
                   className="text-sm font-semibold hover:underline" style={{color:'var(--green-deep)'}}>
                  {p.name}
                </a>
                <div className="text-xs font-mono mt-0.5" style={{color:'var(--ink-soft)'}}>ID #{p.id}</div>
              </div>
              <a href={productUrl(p.id)} target="_blank" rel="noopener"
                 className="text-xs px-3 py-1.5 rounded font-medium btn-hover"
                 style={{background:'var(--green-deep)', color:'var(--cream-light)'}}>
                Voir →
              </a>
            </li>
          ))}
        </ul>
      )}
      <a href={FAIREKO_SHOP} target="_blank" rel="noopener"
         className="block btn-hover p-4 rounded-lg text-center"
         style={{background:'var(--green-deep)', color:'var(--cream-light)'}}>
        <div className="font-medium">🛒 Aller sur le shop FAIRĒKO</div>
        <div className="text-xs opacity-80 mt-1">faireko.be/shop</div>
      </a>
    </Modal>
  );
};

// ========================================================================
// MAIN APP
// ========================================================================

const App = () => {
  const [conversation, setConversation] = useState([]);
  const [input, setInput] = useState('');
  const [loading, setLoading] = useState(false);
  const [recording, setRecording] = useState(false);
  const [modal, setModal] = useState(null);
  const [surface, setSurface] = useState('22');
  const recognitionRef = useRef(null);
  const messagesEndRef = useRef(null);

  // ----- Init: try restore conversation -----
  useEffect(() => {
    const stored = loadConversation();
    if (stored && Array.isArray(stored) && stored.length > 0) {
      setConversation(stored);
    }
  }, []);

  // ----- Persist conversation -----
  useEffect(() => {
    if (conversation.length > 0) saveConversation(conversation);
  }, [conversation]);

  // ----- Auto-scroll -----
  useEffect(() => {
    messagesEndRef.current?.scrollIntoView({ behavior: 'smooth', block: 'end' });
  }, [conversation, loading]);

  // ----- Voice input setup (Web Speech API) -----
  useEffect(() => {
    const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (!SR) return;
    const rec = new SR();
    rec.lang = 'fr-FR';
    rec.continuous = false;
    rec.interimResults = true;
    rec.onresult = (e) => {
      let t = '';
      for (let i = e.resultIndex; i < e.results.length; i++) t += e.results[i][0].transcript;
      setInput(t);
    };
    rec.onend = () => setRecording(false);
    rec.onerror = () => setRecording(false);
    recognitionRef.current = rec;
  }, []);

  const toggleMic = () => {
    if (!recognitionRef.current) {
      alert('La dictée vocale n\'est pas supportée par ce navigateur.\nUtilise Chrome, Edge ou Safari.');
      return;
    }
    if (recording) {
      recognitionRef.current.stop();
      setRecording(false);
    } else {
      try {
        recognitionRef.current.start();
        setRecording(true);
      } catch (e) {
        // Already started
      }
    }
  };

  // ----- Send message -----
  const sendMessage = async (textOverride) => {
    const text = (textOverride !== undefined ? textOverride : input).trim();
    if (!text || loading) return;

    // Build conversation history for backend (Anthropic messages format)
    const userMsg = { role: 'user', text };
    const newConv = [...conversation, userMsg];
    setConversation(newConv);
    setInput('');
    setLoading(true);

    // Backend expects { messages: [{role, content}] }
    const apiMessages = newConv.map(m => {
      if (m.role === 'user') return { role: 'user', content: m.text };
      // assistant: send back the message text only (the JSON wrapper isn't needed for LLM context)
      return { role: 'assistant', content: m.data?.message || '' };
    });

    try {
      const res = await fetch(API_ENDPOINT, {
        method: 'POST',
        headers: {'Content-Type':'application/json'},
        body: JSON.stringify({ messages: apiMessages })
      });
      const data = await res.json();

      if (!data.success && !data.message) {
        setConversation([...newConv, {
          role: 'assistant',
          data: {
            message: 'Désolé, j\'ai eu un souci technique. Réessaie ou contacte ' + FAIREKO_PHONE + '.',
            actions: DEFAULT_ACTIONS,
            quick_options: [],
          }
        }]);
      } else {
        // Ensure actions present
        if (!data.actions || !Array.isArray(data.actions) || data.actions.length === 0) {
          data.actions = DEFAULT_ACTIONS.map(a => ({...a, enabled: a.id === 'expert'}));
        }
        setConversation([...newConv, { role:'assistant', data }]);
      }
    } catch (err) {
      setConversation([...newConv, {
        role: 'assistant',
        data: {
          message: 'Connexion impossible avec Fabien. Vérifie ta connexion ou contacte ' + FAIREKO_PHONE + '.',
          actions: DEFAULT_ACTIONS,
          quick_options: [],
        }
      }]);
    } finally {
      setLoading(false);
    }
  };

  // ----- Reset conversation -----
  const handleReset = () => {
    if (conversation.length === 0 || confirm('Démarrer une nouvelle conversation ?\nL\'historique actuel sera perdu.')) {
      setConversation([]);
      localStorage.removeItem(STORAGE_KEY);
    }
  };

  // ----- Action handler -----
  const handleAction = (id) => {
    setModal(id);
  };

  // Get latest actions from last assistant message, or defaults
  const lastAssistant = [...conversation].reverse().find(m => m.role === 'assistant' && m.data);
  const currentActions = lastAssistant?.data?.actions || DEFAULT_ACTIONS;

  // Collect all unique products in conversation for the panier
  const allProducts = [];
  conversation.forEach(m => {
    if (m.role === 'assistant' && m.data?.produits_suggeres) {
      m.data.produits_suggeres.forEach(p => {
        if (!allProducts.find(x => x.id === p.id)) allProducts.push(p);
      });
    }
  });

  return (
    <>
      {/* Page Fabien dédiée — pleine viewport */}
      <div className="fabien-page">
        <Header onReset={handleReset}
                onCalculator={() => setModal('calc')} />

        {conversation.length === 0 && <BetaBanner />}

        <main className="fabien-page-main">
          <div className="fabien-page-content">
            {conversation.length === 0 ? (
              <Welcome onStart={(text) => sendMessage(text)} />
            ) : (
              <div className="space-y-1">
                {conversation.map((m, i) => {
                  const isLast = i === conversation.length - 1;
                  if (m.role === 'user') return <UserMessage key={i} text={m.text} />;
                  return <AssistantMessage key={i} data={m.data} isLast={isLast && !loading}
                                           onQuickSelect={(text) => sendMessage(text)}
                                           surface={surface}
                                           onSurfaceChange={setSurface}
                                           onCalculator={() => setModal('calc')} />;
                })}
                {loading && <ThinkingMessage />}
                <div ref={messagesEndRef}></div>
              </div>
            )}
          </div>
        </main>

        <footer className="fabien-page-footer">
          <div className="fabien-page-footer-inner">
            <InputBar value={input}
                      onChange={setInput}
                      onSubmit={() => sendMessage()}
                      onMicToggle={toggleMic}
                      recording={recording}
                      disabled={loading} />
            <ActionsBar actions={currentActions} onAction={handleAction} />
          </div>
        </footer>
      </div>

      {/* Modals (overlay sur la page) */}
      <SurfaceCalculator open={modal === 'calc'}   onClose={() => setModal(null)}
                         systeme={lastAssistant?.data?.systeme}
                         initialSurface={surface}
                         onApplySurface={setSurface} />
      <RecapModal        open={modal === 'recap'}  onClose={() => setModal(null)} conversation={conversation} />
      <ExpertModal       open={modal === 'expert'} onClose={() => setModal(null)} />
      <GuideModal        open={modal === 'guide'}  onClose={() => setModal(null)} conversation={conversation} />
      <PanierModal       open={modal === 'panier'} onClose={() => setModal(null)}
                         products={allProducts}
                         conversation={conversation} />
    </>
  );
};

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>

</body>
</html>
