<!--
  fabien-v3-widget.html
  ─────────────────────
  Widget chat FAIRĒKO V3 — drop-in autonome.
  Aucune dépendance, ~250 lignes JS, à coller dans <body> du site
  ou injecter via Odoo custom_code_head.

  Connexion : POST /api/v3/chat (Netlify Function fabien-v3.mjs)

  Usage standalone (test) : ouvrir ce fichier dans un navigateur, ça marche.
-->
<style>
  #fk-fabien-bubble {
    position: fixed; bottom: 24px; right: 24px; z-index: 9999;
    width: 56px; height: 56px; border-radius: 50%;
    background: #2c5f4a; color: white; border: none; cursor: pointer;
    box-shadow: 0 4px 16px rgba(0,0,0,0.2);
    font-size: 28px; line-height: 1;
    display: flex; align-items: center; justify-content: center;
  }
  #fk-fabien-panel {
    position: fixed; bottom: 90px; right: 24px; z-index: 9998;
    width: 380px; max-width: calc(100vw - 32px); height: 600px; max-height: calc(100vh - 120px);
    background: white; border-radius: 12px; box-shadow: 0 8px 32px rgba(0,0,0,0.25);
    display: none; flex-direction: column; overflow: hidden;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  }
  #fk-fabien-panel.fk-open { display: flex; }
  #fk-fabien-header {
    padding: 14px 16px; background: #2c5f4a; color: white;
    display: flex; justify-content: space-between; align-items: center;
  }
  #fk-fabien-header strong { font-size: 15px; }
  #fk-fabien-header .fk-sub { font-size: 11px; opacity: 0.8; display: block; margin-top: 2px; }
  #fk-fabien-close { background: none; border: none; color: white; font-size: 22px; cursor: pointer; line-height: 1; }
  #fk-fabien-messages {
    flex: 1; overflow-y: auto; padding: 16px;
    display: flex; flex-direction: column; gap: 12px;
    background: #f7f5f0;
  }
  .fk-msg { padding: 10px 14px; border-radius: 14px; max-width: 85%; line-height: 1.45; font-size: 14px; }
  .fk-msg-user { align-self: flex-end; background: #2c5f4a; color: white; border-bottom-right-radius: 4px; }
  .fk-msg-bot { align-self: flex-start; background: white; color: #222; border-bottom-left-radius: 4px; box-shadow: 0 1px 2px rgba(0,0,0,0.08); }
  .fk-card { background: white; border: 1px solid #e0dcd0; border-radius: 10px; padding: 12px; margin-top: 6px; font-size: 13px; }
  .fk-card h4 { margin: 0 0 6px; font-size: 14px; color: #2c5f4a; }
  .fk-card .fk-explain { margin: 0 0 10px; color: #444; font-size: 13px; }
  .fk-product { display: flex; flex-direction: column; padding: 8px; border: 1px solid #eae6dc; border-radius: 6px; margin-top: 6px; background: #fafaf6; }
  .fk-product-name { font-weight: 600; font-size: 13px; color: #1a1a1a; }
  .fk-product-why { font-size: 12px; color: #555; margin-top: 2px; }
  .fk-product-actions { display: flex; gap: 6px; margin-top: 8px; flex-wrap: wrap; }
  .fk-btn { padding: 6px 10px; border-radius: 5px; font-size: 12px; border: 1px solid #2c5f4a; background: white; color: #2c5f4a; cursor: pointer; text-decoration: none; }
  .fk-btn-primary { background: #2c5f4a; color: white; }
  .fk-vigilance { margin-top: 8px; padding: 8px; background: #fff7e6; border-left: 3px solid #d97706; border-radius: 4px; font-size: 12px; }
  .fk-vigilance strong { color: #92400e; }
  .fk-confidence { display: inline-block; padding: 4px 10px; border-radius: 12px; font-size: 12px; font-weight: 600; margin-bottom: 10px; }
  .fk-conf-high { background: #d1fae5; color: #065f46; }
  .fk-conf-medium { background: #fef3c7; color: #92400e; }
  .fk-conf-expert { background: #fee2e2; color: #991b1b; }
  .fk-question-list { margin: 6px 0 0; padding-left: 18px; }
  .fk-question-list li { margin: 3px 0; font-size: 13px; }
  #fk-fabien-input-row { padding: 12px; border-top: 1px solid #eee; background: white; display: flex; gap: 8px; }
  #fk-fabien-input { flex: 1; padding: 10px; border: 1px solid #ddd; border-radius: 6px; font-size: 14px; resize: none; min-height: 40px; max-height: 100px; font-family: inherit; }
  #fk-fabien-send { padding: 0 16px; background: #2c5f4a; color: white; border: none; border-radius: 6px; cursor: pointer; font-weight: 600; }
  #fk-fabien-send:disabled { opacity: 0.5; cursor: not-allowed; }
  .fk-typing { font-style: italic; color: #888; font-size: 13px; }
</style>

<button id="fk-fabien-bubble" aria-label="Ouvrir l'assistant Fabien">💬</button>

<div id="fk-fabien-panel" role="dialog" aria-label="Assistant Fabien">
  <div id="fk-fabien-header">
    <div>
      <strong>Fabien — Assistant FAIRĒKO</strong>
      <span class="fk-sub">Matériaux biosourcés & bas carbone</span>
    </div>
    <button id="fk-fabien-close" aria-label="Fermer">×</button>
  </div>
  <div id="fk-fabien-messages"></div>
  <div id="fk-fabien-input-row">
    <textarea id="fk-fabien-input" placeholder="Décrivez votre projet…" rows="1"></textarea>
    <button id="fk-fabien-send">→</button>
  </div>
</div>

<script>
(function() {
  const ENDPOINT = "/api/v3/chat"; // Netlify redirect → fabien-v3.mjs
  const SHOP_BASE = "https://www.faireko.be"; // pour préfixer les website_url relatifs

  const $bubble = document.getElementById("fk-fabien-bubble");
  const $panel = document.getElementById("fk-fabien-panel");
  const $close = document.getElementById("fk-fabien-close");
  const $msgs = document.getElementById("fk-fabien-messages");
  const $input = document.getElementById("fk-fabien-input");
  const $send = document.getElementById("fk-fabien-send");

  // Historique de conversation (envoyé à chaque appel)
  const history = [];

  $bubble.addEventListener("click", () => {
    $panel.classList.toggle("fk-open");
    if ($panel.classList.contains("fk-open") && history.length === 0) {
      addBotText("Bonjour ! Je suis Fabien, l'assistant FAIRĒKO. Décrivez-moi votre projet (que voulez-vous faire ? mur, sol, toiture ? intérieur ou extérieur ? bâti ancien ?) et je vous oriente vers les bons matériaux.");
    }
  });
  $close.addEventListener("click", () => $panel.classList.remove("fk-open"));

  $input.addEventListener("keydown", (e) => {
    if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); sendMessage(); }
  });
  $send.addEventListener("click", sendMessage);

  async function sendMessage() {
    const text = $input.value.trim();
    if (!text) return;
    $input.value = "";
    addUserMsg(text);
    history.push({ role: "user", content: text });
    setLoading(true);

    try {
      const r = await fetch(ENDPOINT, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ messages: history }),
      });
      const data = await r.json();
      if (!data.ok) {
        addBotText("⚠️ Une erreur est survenue. Réessayez ou contactez hello@nbsdistribution.eu.");
        console.error("[fabien-v3]", data);
        return;
      }

      // Si on a une card structurée, on rend riche. Sinon raw.
      if (data.card) {
        renderCard(data.card);
        // Pour la prochaine itération, on stocke le résumé textuel + JSON
        history.push({ role: "assistant", content: data.raw });
      } else {
        addBotText(data.raw || "(pas de réponse)");
        history.push({ role: "assistant", content: data.raw || "" });
      }
    } catch (e) {
      addBotText("⚠️ Erreur réseau. Réessayez.");
      console.error(e);
    } finally {
      setLoading(false);
    }
  }

  function setLoading(on) {
    $send.disabled = on;
    if (on) {
      const div = document.createElement("div");
      div.className = "fk-msg fk-msg-bot fk-typing";
      div.id = "fk-typing";
      div.textContent = "Fabien réfléchit…";
      $msgs.appendChild(div);
      scroll();
    } else {
      const t = document.getElementById("fk-typing");
      if (t) t.remove();
    }
  }

  function addUserMsg(t) {
    const div = document.createElement("div");
    div.className = "fk-msg fk-msg-user";
    div.textContent = t;
    $msgs.appendChild(div);
    scroll();
  }
  function addBotText(t) {
    const div = document.createElement("div");
    div.className = "fk-msg fk-msg-bot";
    div.textContent = t;
    $msgs.appendChild(div);
    scroll();
  }

  // ─── Card → UI mapping ─────────────────────────────────────────────
  function renderCard(card) {
    // Texte d'intro avant la card si dispo (raw mais sans le JSON)
    const wrap = document.createElement("div");
    wrap.className = "fk-msg fk-msg-bot";

    // 1. Reformulation
    if (card.summary) {
      const p = document.createElement("p");
      p.style.margin = "0 0 8px";
      p.style.fontSize = "13px";
      p.style.color = "#444";
      p.innerHTML = "<em>" + escapeHtml(card.summary) + "</em>";
      wrap.appendChild(p);
    }

    // 2. Mode "questions"
    if (card.kind === "questions" && Array.isArray(card.questions) && card.questions.length) {
      const q = document.createElement("div");
      q.innerHTML = "<strong>Pour mieux vous orienter :</strong>";
      const ul = document.createElement("ul");
      ul.className = "fk-question-list";
      card.questions.forEach(qt => {
        const li = document.createElement("li");
        li.textContent = qt;
        ul.appendChild(li);
      });
      q.appendChild(ul);
      wrap.appendChild(q);
      $msgs.appendChild(wrap);
      scroll();
      return;
    }

    // 3. Mode "answer" : solutions
    if (Array.isArray(card.solutions)) {
      card.solutions.forEach(sol => wrap.appendChild(renderSolution(sol, card.cta)));
    }

    // 4. Documents joints
    if (Array.isArray(card.documents) && card.documents.length) {
      const docDiv = document.createElement("div");
      docDiv.className = "fk-card";
      docDiv.innerHTML = "<h4>📄 Documents</h4>";
      card.documents.forEach(d => {
        const a = document.createElement("a");
        a.href = d.url.startsWith("/") ? SHOP_BASE + d.url : d.url;
        a.target = "_blank"; a.rel = "noopener";
        a.textContent = d.name;
        a.style.display = "block";
        a.style.fontSize = "12px";
        a.style.color = "#2c5f4a";
        a.style.marginTop = "4px";
        docDiv.appendChild(a);
      });
      wrap.appendChild(docDiv);
    }

    $msgs.appendChild(wrap);
    scroll();
  }

  function renderSolution(sol, ctas) {
    const card = document.createElement("div");
    card.className = "fk-card";

    const conf = sol.confidence || "medium";
    const confLabel = {
      high: "🟢 Compatible",
      medium: "🟠 Validation recommandée",
      expert_required: "🔴 Expertise requise"
    }[conf] || conf;
    const confClass = { high: "fk-conf-high", medium: "fk-conf-medium", expert_required: "fk-conf-expert" }[conf] || "fk-conf-medium";
    card.innerHTML = '<span class="fk-confidence ' + confClass + '">' + confLabel + '</span>';

    if (sol.title) {
      const h = document.createElement("h4");
      h.textContent = sol.title;
      card.appendChild(h);
    }
    if (sol.explanation) {
      const p = document.createElement("p");
      p.className = "fk-explain";
      p.textContent = sol.explanation;
      card.appendChild(p);
    }

    // Produits associés
    if (Array.isArray(sol.products)) {
      sol.products.forEach(p => card.appendChild(renderProduct(p, ctas)));
    }

    // Vigilances
    if (Array.isArray(sol.vigilances) && sol.vigilances.length) {
      const v = document.createElement("div");
      v.className = "fk-vigilance";
      v.innerHTML = "<strong>⚠ Vigilance :</strong>";
      const ul = document.createElement("ul");
      ul.style.margin = "4px 0 0"; ul.style.paddingLeft = "18px";
      sol.vigilances.forEach(t => {
        const li = document.createElement("li");
        li.textContent = t;
        ul.appendChild(li);
      });
      v.appendChild(ul);
      card.appendChild(v);
    }

    return card;
  }

  function renderProduct(p, ctas) {
    const div = document.createElement("div");
    div.className = "fk-product";
    const url = p.url ? (p.url.startsWith("/") ? SHOP_BASE + p.url : p.url) : null;

    const name = document.createElement("div");
    name.className = "fk-product-name";
    name.textContent = p.name || ("Produit #" + p.id);
    div.appendChild(name);

    if (p.why) {
      const why = document.createElement("div");
      why.className = "fk-product-why";
      why.textContent = p.why;
      div.appendChild(why);
    }

    const actions = document.createElement("div");
    actions.className = "fk-product-actions";
    const wantedCtas = Array.isArray(ctas) && ctas.length ? ctas : ["view_product", "request_quote"];

    if (wantedCtas.includes("view_product") && url) {
      const a = document.createElement("a");
      a.href = url; a.target = "_blank"; a.rel = "noopener";
      a.className = "fk-btn fk-btn-primary";
      a.textContent = "Voir produit";
      actions.appendChild(a);
    }
    if (wantedCtas.includes("request_quote")) {
      const a = document.createElement("a");
      a.href = "mailto:hello@nbsdistribution.eu?subject=Demande%20de%20devis%20-%20" + encodeURIComponent(p.name || "");
      a.className = "fk-btn";
      a.textContent = "Demander devis";
      actions.appendChild(a);
    }
    if (wantedCtas.includes("create_draft_cart")) {
      const b = document.createElement("button");
      b.className = "fk-btn";
      b.textContent = "Panier brouillon";
      b.addEventListener("click", () => createDraftCart(p));
      actions.appendChild(b);
    }
    div.appendChild(actions);
    return div;
  }

  // ─── CTA panier brouillon (clic utilisateur uniquement) ───────────
  async function createDraftCart(product) {
    const email = prompt("Email pour rattacher le panier (optionnel) :");
    if (email === null) return; // annulé
    const qty = parseFloat(prompt("Quantité ?", "1"));
    if (!qty || qty <= 0) return;

    addBotText("Création du panier brouillon en cours…");
    try {
      // Appel direct au bridge — token côté backend Netlify pour ne pas l'exposer
      // donc on passe par notre fabien-v3 qui proxy. Mais cart/create n'est PAS dans
      // les tools du LLM — on fait un endpoint dédié /api/v3/cart-create
      const r = await fetch("/api/v3/cart-create", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          partner_email: email || undefined,
          audience: "b2c",
          lines: [{ product_id: product.id, qty }],
          note: "Panier généré via widget Fabien V3"
        }),
      });
      const data = await r.json();
      if (data.ok && data.data?.portal_url) {
        addBotText("✅ Panier créé. " + (data.data.portal_url ? "Lien : " + SHOP_BASE + data.data.portal_url : ""));
      } else if (data.ok) {
        addBotText("✅ Panier brouillon créé (n° " + (data.data?.name || data.data?.sale_order_id) + "). Notre équipe vous recontacte.");
      } else {
        addBotText("⚠️ Création panier échouée : " + (data.error?.message || "erreur inconnue"));
      }
    } catch (e) {
      addBotText("⚠️ Erreur réseau panier.");
    }
  }

  function escapeHtml(s) {
    return String(s).replace(/[&<>"']/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));
  }
  function scroll() { $msgs.scrollTop = $msgs.scrollHeight; }
})();
</script>
