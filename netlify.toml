[build]
  publish = "."
  functions = "functions"

[build.environment]
  SECRETS_SCAN_OMIT_KEYS = "ODOO_URL,ODOO_DB,ODOO_UID,ODOO_LOGIN"

[[redirects]]
  from = "/api/fabien"
  to = "/.netlify/functions/fabien"
  status = 200
  force = true

[[redirects]]
  from = "/api/ask"
  to = "/.netlify/functions/prescribe"
  status = 200
  force = true

[[redirects]]
  from = "/api/odoo"
  to = "/.netlify/functions/odoo-proxy"
  status = 200
  force = true

[[redirects]]
  from = "/api/fabien-v2"
  to = "/.netlify/functions/fabien-v2"
  status = 200
  force = true

[[headers]]
  for = "/api/*"
  [headers.values]
    Access-Control-Allow-Origin = "*"
    Access-Control-Allow-Headers = "Content-Type"
    Access-Control-Allow-Methods = "POST, GET, OPTIONS"
